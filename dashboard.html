<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="checkSession(); showUser(); loadTrades();">

<header class="navbar">

<h2>Trueknet</h2>

<div>
Bienvenido <strong id="userName"></strong>
<button onclick="logout()">Cerrar sesión</button>
</div>

</header>

<section class="formulario">

<h2>Publicar Trueque</h2>

<input id="titulo" placeholder="Qué ofreces">
<input id="descripcion" placeholder="Descripción">
<input id="busca" placeholder="Qué buscas a cambio">
<input id="imagen" placeholder="URL imagen">

<select id="categoria">
<option value="tecnologia">Tecnología</option>
<option value="ropa">Ropa</option>
<option value="servicios">Servicios</option>
<option value="hogar">Hogar</option>
</select>

<button onclick="createTrade()">Publicar</button>

</section>


<section class="categories">

<button onclick="filterCategory('todos')">Todos</button>
<button onclick="filterCategory('tecnologia')">Tecnología</button>
<button onclick="filterCategory('ropa')">Ropa</button>
<button onclick="filterCategory('servicios')">Servicios</button>
<button onclick="filterCategory('hogar')">Hogar</button>

</section>


<section class="listado">

<h2>Trueques disponibles</h2>

<div id="tradesContainer" class="cards"></div>

</section>

<script src="script.js"></script>

</body>
</html>
